version: '3.8'

networks:
  depin-network:
    driver: bridge

services:

  orderer.example.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.example.com
    environment:
      - ORDERER_GENERAL_LOGLEVEL=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=false
    volumes:
      - ../blockchain/organizations/ordererOrganizations/orderer.example.com/orderers/orderer.orderer.example.com/msp:/etc/hyperledger/fabric/msp
      - ../blockchain/organizations/ordererOrganizations/orderer.example.com/orderers/orderer.orderer.example.com/tls:/etc/hyperledger/fabric/tls
    ports:
      - "7050:7050"
    networks:
      - depin-network

  peer0.manufacturer.example.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.manufacturer.example.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_PEER_ID=peer0.manufacturer.example.com
      - CORE_PEER_ADDRESS=peer0.manufacturer.example.com:7051
      - CORE_PEER_LOCALMSPID=ManufacturerMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=false
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.manufacturer:5984
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../blockchain/organizations/peerOrganizations/manufacturer.example.com/peers/peer0.manufacturer.example.com/msp:/etc/hyperledger/fabric/msp
    ports:
      - "7051:7051"
    depends_on:
      - orderer.example.com
      - couchdb.manufacturer
    networks:
      - depin-network

  peer0.maintenance.example.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.maintenance.example.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_PEER_ID=peer0.maintenance.example.com
      - CORE_PEER_ADDRESS=peer0.maintenance.example.com:9051
      - CORE_PEER_LOCALMSPID=MaintenanceMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=false
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.maintenance:5984
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../blockchain/organizations/peerOrganizations/maintenance.example.com/peers/peer0.maintenance.example.com/msp:/etc/hyperledger/fabric/msp
    ports:
      - "9051:9051"
    depends_on:
      - orderer.example.com
      - couchdb.maintenance
    networks:
      - depin-network

  couchdb.manufacturer:
    image: couchdb:3.3
    container_name: couchdb.manufacturer
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    networks:
      - depin-network

  couchdb.maintenance:
    image: couchdb:3.3
    container_name: couchdb.maintenance
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    networks:
      - depin-network
