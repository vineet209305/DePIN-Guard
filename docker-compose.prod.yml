# docker-compose.prod.yml
# Complete DePIN-Guard Stack for 24/7 Production Deployment
# Combines: Blockchain (with auto-initialization) + All App Services
# 
# Usage:
#   docker-compose -f docker-compose.prod.yml build
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml logs -f
#
# This file brings EVERYTHING up in correct order automatically

version: '3.8'

networks:
  depin-prod:
    name: depin-prod
    driver: bridge

volumes:
  # Blockchain persistent storage
  orderer-data:
  peer-mfg-data:
  peer-maint-data:
  couchdb-mfg-data:
  couchdb-maint-data:
  blockchain-certs:
  blockchain-artifacts:

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INITIALIZATION SERVICE (runs once, then stops)
  # ═══════════════════════════════════════════════════════════════════════════
  blockchain-init:
    build:
      context: ./scripts/docker-blockchain-init
      dockerfile: Dockerfile
    container_name: blockchain-init
    environment:
      - FABRIC_CFG_PATH=/root/config
      - CONFIG_DIR=/root/config
      - ORGS_DIR=/root/organizations
      - ARTIFACTS_DIR=/root/channel-artifacts
      - ORDERER_HOST=orderer.depin
      - PEER_MFG_HOST=peer0.manufacturer.depin
      - PEER_MAINT_HOST=peer0.maintenance.depin
      - CHANNEL_NAME=mychannel
    volumes:
      - blockchain-certs:/root/organizations
      - blockchain-artifacts:/root/channel-artifacts
      - ./blockchain/config:/root/config
    networks:
      - depin-prod
    # REMOVED circular dependencies - init generates certs BEFORE orderer/peers start
    # Init container exits after setup completes (does not stay running)

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOCKCHAIN SERVICES (Hyperledger Fabric)
  # ═══════════════════════════════════════════════════════════════════════════

  orderer.depin:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.depin
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/genesis.block
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:17050
    working_dir: /root
    command: orderer
    ports:
      - "7050:7050"
      - "17050:17050"
    volumes:
      - blockchain-certs:/var/hyperledger/orderer
      - orderer-data:/var/hyperledger/production/orderer
    depends_on:
      blockchain-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "sh", "-c", "test -e /var/hyperledger/orderer/genesis.block && echo 'healthy' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - depin-prod
    restart: unless-stopped

  couchdb-manufacturer:
    image: couchdb:3.3.3
    container_name: couchdb-manufacturer
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb-mfg-data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - depin-prod
    restart: unless-stopped

  peer0.manufacturer.depin:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.manufacturer.depin
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=depin-prod
      - FABRIC_LOGGING_SPEC=INFO
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.manufacturer.depin
      - CORE_PEER_ADDRESS=peer0.manufacturer.depin:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.manufacturer.depin:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.manufacturer.depin:7051
      - CORE_PEER_LOCALMSPID=ManufacturerMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb-manufacturer:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=peer0.manufacturer.depin:17051
    working_dir: /root
    command: peer node start
    ports:
      - "7051:7051"
      - "17051:17051"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - blockchain-certs:/etc/hyperledger/fabric
      - peer-mfg-data:/var/hyperledger/production
    depends_on:
      couchdb-manufacturer:
        condition: service_started
      blockchain-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "peer", "version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - depin-prod
    restart: unless-stopped

  couchdb-maintenance:
    image: couchdb:3.3.3
    container_name: couchdb-maintenance
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    volumes:
      - couchdb-maint-data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7984/_up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - depin-prod
    restart: unless-stopped

  peer0.maintenance.depin:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.maintenance.depin
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=depin-prod
      - FABRIC_LOGGING_SPEC=INFO
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.maintenance.depin
      - CORE_PEER_ADDRESS=peer0.maintenance.depin:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.maintenance.depin:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.maintenance.depin:9051
      - CORE_PEER_LOCALMSPID=MaintenanceProviderMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb-maintenance:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=peer0.maintenance.depin:17052
    working_dir: /root
    command: peer node start
    ports:
      - "9051:9051"
      - "17052:17052"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - blockchain-certs:/etc/hyperledger/fabric
      - peer-maint-data:/var/hyperledger/production
    depends_on:
      couchdb-maintenance:
        condition: service_started
      blockchain-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "peer", "version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - depin-prod
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # APP SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  ai-service:
    build: ./ai-service
    container_name: ai-service
    ports:
      - "10000:10000"
    environment:
      - FLASK_ENV=production
      - PORT=10000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - depin-prod
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
    env_file:
      - ./auth-service/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - depin-prod
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - DEPIN_API_KEY=${DEPIN_API_KEY:-depin-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
      - AI_SERVICE_URL=http://ai-service:10000/predict
      - BLOCKCHAIN_ENABLED=true
    env_file:
      - ./backend/.env
    depends_on:
      ai-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      blockchain-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - depin-prod
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_AUTH_URL=http://localhost:8001
      - VITE_API_KEY=${DEPIN_API_KEY:-depin-secret-key}
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - depin-prod
    restart: unless-stopped

  iot-simulator:
    build: ./iot-simulator
    container_name: iot-simulator
    environment:
      - BACKEND_URL=http://backend:8000
      - DEPIN_API_KEY=${DEPIN_API_KEY:-depin-secret-key}
      - SIMULATOR_MODE=${SIMULATOR_MODE:-synthetic}
    env_file:
      - ./iot-simulator/.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - depin-prod
    restart: unless-stopped
