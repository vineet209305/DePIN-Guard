# blockchain/configtx.yaml
# FIX: Orderer Addresses changed from orderer.example.com to orderer.orderer.example.com
# FIX: EtcdRaft consenter host aligned to orderer.orderer.example.com

Organizations:
  - &OrdererOrg
    Name: OrdererMSP
    ID: OrdererMSP
    MSPDir: organizations/ordererOrganizations/orderer.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"

  - &ManufacturerOrg
    Name: ManufacturerMSP
    ID: ManufacturerMSP
    MSPDir: organizations/peerOrganizations/manufacturer.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('ManufacturerMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('ManufacturerMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('ManufacturerMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('ManufacturerMSP.peer')"
    AnchorPeers:
      - Host: peer0.manufacturer.example.com
        Port: 7051

  - &MaintenanceProviderOrg
    Name: MaintenanceProviderMSP
    ID: MaintenanceProviderMSP
    MSPDir: organizations/peerOrganizations/maintenance.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('MaintenanceProviderMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('MaintenanceProviderMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('MaintenanceProviderMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('MaintenanceProviderMSP.peer')"
    AnchorPeers:
      - Host: peer0.maintenance.example.com
        Port: 9051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  # FIX: must match the FQDN generated by cryptogen (hostname.domain)
  Addresses:
    - orderer.orderer.example.com:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  EtcdRaft:
    Consenters:
      # FIX: Host must be orderer.orderer.example.com (hostname=orderer, domain=orderer.example.com)
      - Host: orderer.orderer.example.com
        Port: 7050
        ClientTLSCert: organizations/ordererOrganizations/orderer.example.com/orderers/orderer.orderer.example.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/orderer.example.com/orderers/orderer.orderer.example.com/tls/server.crt
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  ManufacturerMaintenanceOrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Consortiums:
      DePINConsortium:
        Organizations:
          - *ManufacturerOrg
          - *MaintenanceProviderOrg

  ManufacturerMaintenanceChannel:
    Consortium: DePINConsortium
    <<: *ApplicationDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *ManufacturerOrg
        - *MaintenanceProviderOrg
      Capabilities:
        <<: *ApplicationCapabilities
