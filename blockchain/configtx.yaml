# blockchain/configtx.yaml — HA-ready structure
# Current: single orderer + single peer per org (demo)
# To enable HA: add orderer2/orderer3 to Addresses and EtcdRaft.Consenters

Organizations:

  - &ManufacturerOrg
    Name: ManufacturerMSP
    ID: ManufacturerMSP
    MSPDir: ../organizations/peerOrganizations/manufacturer.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('ManufacturerMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('ManufacturerMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('ManufacturerMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('ManufacturerMSP.peer')"
    AnchorPeers:
      - Host: peer0.manufacturer.example.com
        Port: 7051

  - &MaintenanceProviderOrg
    Name: MaintenanceProviderMSP
    ID: MaintenanceProviderMSP
    MSPDir: ../organizations/peerOrganizations/maintenance.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('MaintenanceProviderMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('MaintenanceProviderMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('MaintenanceProviderMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('MaintenanceProviderMSP.peer')"
    AnchorPeers:
      - Host: peer0.maintenance.example.com
        Port: 9051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.example.com:7050
    # HA: add orderer2.example.com:7050 and orderer3.example.com:7050 here
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  EtcdRaft:
    Consenters:
      - Host: orderer.example.com
        Port: 7050
        ClientTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls/server.crt
        ServerTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls/server.crt
        # HA: add consenters for orderer2 and orderer3 here
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:

  # Current demo profile — 1 orderer, 1 peer per org
  ManufacturerMaintenanceOrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *ManufacturerOrg
        - *MaintenanceProviderOrg
    Consortiums:
      DePINConsortium:
        Organizations:
          - *ManufacturerOrg
          - *MaintenanceProviderOrg

  ManufacturerMaintenanceChannel:
    Consortium: DePINConsortium
    <<: *ApplicationDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *ManufacturerOrg
        - *MaintenanceProviderOrg
      Capabilities:
        <<: *ApplicationCapabilities
