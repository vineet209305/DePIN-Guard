# docker-compose.yml — Lab mode (full stack)
# For demo mode: run each service locally with the commands listed in Demo_Runbook.md
version: '3.9'

services:

  ai-service:
    build: ./ai-service
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      - JWT_SECRET_KEY=my_super_secret_key

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DEPIN_API_KEY=Depin_Project_Secret_Key_999
      - AI_SERVICE_URL=http://ai-service:5000/predict
      - JWT_SECRET_KEY=my_super_secret_key
    depends_on:
      - ai-service
      - auth-service

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
