# docker-compose.yml — Lab mode (full stack)
# For demo mode: run each service locally with the commands listed in Demo_Runbook.md

services:

  ai-service:
    build: ./ai-service
    ports:
      - "10000:10000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - PORT=10000

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    restart: unless-stopped
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - auth_db:/app

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - DEPIN_API_KEY=${DEPIN_API_KEY}
      - AI_SERVICE_URL=http://ai-service:10000/predict
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - ai-service
      - auth-service

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_API_KEY=${DEPIN_API_KEY}
        - VITE_AUTH_URL=http://localhost:8001
    ports:
      - "5173:5173"
    restart: unless-stopped
    depends_on:
      - backend

  iot-simulator:
    build: ./iot-simulator
    container_name: iot-simulator
    environment:
      - BACKEND_URL=http://backend:8000
      - DEPIN_API_KEY=${DEPIN_API_KEY}
      - SIMULATOR_MODE=synthetic
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  auth_db: